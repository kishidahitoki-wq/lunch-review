<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DO評 プロンプトメーカー</title>
    <style>
        :root {
            --edo-gold: #d4af37;
            --edo-black: #1a1a1a;
            --edo-red: #8b0000;
            --edo-white: #e8eaed;
            --card-bg: rgba(45, 45, 45, 0.95);
            --input-bg: #3d3d3d;
            --primary-color: #4285f4;
        }

        body {
            font-family: "Hiragino Mincho ProN", "ヒラギノ明朝 ProN", serif;
            background-color: var(--edo-black);
            color: var(--edo-white);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden; 
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 4px;
            border: 4px double var(--edo-gold);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        /* キャラクターエリア */
        .char-fixed-area {
            position: fixed;
            bottom: -10px;
            right: 0; 
            width: 350px; 
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .char-img {
            width: 100%;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        .fukidashi {
            position: relative;
            background: var(--edo-white);
            color: var(--edo-black);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: -15px;
            margin-right: 50px;
            font-weight: bold;
            border: 2px solid var(--edo-gold);
            pointer-events: auto;
            font-size: 0.9rem;
        }

        h1 { text-align: center; color: var(--edo-gold); text-shadow: 2px 2px 0px var(--edo-red); border-bottom: 1px solid var(--edo-gold); padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #444; border-radius: 4px; background: rgba(0,0,0,0.2); }
        label { font-weight: bold; display: block; margin-bottom: 10px; color: var(--edo-gold); }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #555; border-radius: 4px; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        /* 評価項目カード */
        .review-entry { 
            background: #333; 
            padding: 20px 15px 15px 15px; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            position: relative; 
            border-left: 5px solid var(--edo-gold); 
            animation: fadeIn 0.3s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid-inputs { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; }
        
        .remove-btn { 
            position: absolute; 
            top: -10px; 
            right: -10px; 
            background: var(--edo-red); 
            color: white; 
            border: 2px solid var(--edo-white); 
            border-radius: 50%; 
            width: 26px; 
            height: 26px; 
            cursor: pointer; 
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn { padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; position: relative; overflow: hidden; }
        .btn-add { background: transparent; color: var(--edo-gold); border: 2px dashed var(--edo-gold); margin-bottom: 20px; font-size: 1rem; }
        .btn-generate { background: linear-gradient(135deg, var(--edo-gold), #b8860b); color: #1a1a1a; font-size: 1.2rem; box-shadow: 0 4px 0 var(--edo-red); }
        .btn:disabled { opacity: 0.8; cursor: not-allowed; }

        /* AI作成ボタン専用アニメーション */
        .btn-loading {
            background: linear-gradient(90deg, #444, var(--edo-gold), #444) !important;
            background-size: 200% 100% !important;
            animation: loadingBar 1.5s infinite linear;
            color: white !important;
        }

        @keyframes loadingBar {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #loading { text-align: center; color: var(--edo-gold); margin: 20px 0; display: none; font-weight: bold; }

        .result-box { 
            background: #000; 
            color: #0f0; 
            padding: 20px; 
            border-radius: 4px; 
            white-space: pre-wrap; 
            font-family: monospace; 
            margin-top: 20px; 
            border: 1px solid #333;
            max-height: 300px; 
            overflow-y: auto; 
            border-left: 3px solid var(--edo-gold);
        }

        .do-loader {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            color: var(--edo-gold);
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px var(--edo-red);
        }

        .do-loader span {
            display: inline-block;
            animation: bounceDO 0.6s infinite alternate;
        }
        .do-loader span:nth-child(2) { animation-delay: 0.2s; }

        @keyframes bounceDO {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-20px) scale(1.1); }
        }
    </style>
</head>
<body>

<div class="char-fixed-area">
    <div class="fukidashi" id="do-speech">データは嘘をつかないDO。</div>
    <img src="do-hero.png" alt="DO Hero" class="char-img">
</div>

<div class="container">
    <h1>🍴 本日のDO評メーカー</h1>

    <div class="section">
        <label for="reviewTitle">一. 題名</label>
        <input type="text" id="reviewTitle" value="江戸ッ子DO の『本日のDO評』（Weekly Lunch Review）">

        <label>二. キャラクター設定</label>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="charSummary" placeholder="筋肉隆々の江戸っ子" style="margin-bottom: 0;">
            <button class="btn" id="charGenBtn" style="width:120px; background:#444; color:white; border:1px solid var(--edo-gold);" onclick="autoGenerateCharacter()">AI作成</button>
        </div>
        <textarea id="charSetting" placeholder="AI生成ボタンを押すか、直接入力してDO！"></textarea>
    </div>

    <div class="section">
        <label for="reviewStyle">三. スタイル</label>
        <select id="reviewStyle">
            <option value="photorealistic">リアル（3Dレンダリング風）</option>
            <option value="anime">アニメ（ジャンプ風）</option>
            <option value="ukiyo-e">浮世絵（江戸時代風）</option>
            <option value="pixel">ドット絵（レトロゲーム風）</option>
        </select>
    </div>

    <div class="section">
        <label>四. 評価項目 (最大9枚)</label>
        <div id="reviewContainer">
            <div class="review-entry">
                <button class="remove-btn" onclick="removeField(this)">×</button>
                <div class="grid-inputs">
                    <input type="text" placeholder="項目" class="dish-name">
                    <input type="number" class="stars" min="1" max="5" value="5">
                </div>
                <input type="text" placeholder="一言コメント" class="comment">
            </div>
        </div>
        <button class="btn btn-add" onclick="addReviewField()">＋ 項目を追加するDO！</button>
    </div>

    <button class="btn btn-generate" id="generateBtn" onclick="generatePrompt()">プロンプトを生成する</button>

    <div id="loading">
        <div class="do-loader">
            <span>D</span><span>O</span>
        </div>
        <p id="loadingText">Geminiが究極の演出を肉付け中だDO...</p>
    </div>

    <div id="resultContainer" style="display:none;">
        <div class="result-box" id="promptResult"></div>
        <button class="btn" style="background:var(--edo-gold); margin-top:10px;" onclick="copyPrompt()">📋 写本（コピー）する</button>
    </div>
</div>

<script>
    // --- 初期化 ---
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.review-entry').forEach(entry => attachKeyEvents(entry));
    });

    function showLoading(text) {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultContainer').style.display = 'none';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    // --- 項目操作 (Enter/Backspace対応) ---
    function addReviewField() {
        const container = document.getElementById('reviewContainer');
        if (container.getElementsByClassName('review-entry').length >= 9) return;

        const div = document.createElement('div');
        div.className = 'review-entry';
        div.innerHTML = `
            <button class="remove-btn" onclick="removeField(this)">×</button>
            <div class="grid-inputs">
                <input type="text" placeholder="項目" class="dish-name">
                <input type="number" class="stars" min="1" max="5" value="5">
            </div>
            <input type="text" placeholder="一言コメント" class="comment">
        `;
        container.appendChild(div);
        div.querySelector('.dish-name').focus();
        attachKeyEvents(div);
    }

    function removeField(btn) {
        const container = document.getElementById('reviewContainer');
        if (container.getElementsByClassName('review-entry').length <= 1) return;
        btn.parentElement.remove();
    }

    function attachKeyEvents(entry) {
        const inputs = entry.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addReviewField();
                }
                if (e.key === 'Backspace') {
                    const dish = entry.querySelector('.dish-name').value;
                    const comm = entry.querySelector('.comment').value;
                    if (dish === "" && comm === "") {
                        const entries = document.getElementsByClassName('review-entry');
                        if (entries.length > 1) {
                            e.preventDefault();
                            const prev = entry.previousElementSibling;
                            entry.remove();
                            if (prev) prev.querySelector('.comment').focus();
                        }
                    }
                }
            });
        });
    }

    // --- 通信系 ---
    async function autoGenerateCharacter() {
        const summary = document.getElementById('charSummary').value;
        if (!summary) return alert("概要を入力してDO！");
        
        const btn = document.getElementById('charGenBtn');
        btn.disabled = true;
        btn.classList.add('btn-loading');
        btn.textContent = "思案中...";
        showLoading("最高のキャラ設定を思案中だDO！");

        try {
            const response = await fetch('/api/generate-character', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ summary: summary })
            });
            const data = await response.json();
            document.getElementById('charSetting').value = data.characterSetting;
        } catch (e) {
            alert("通信失敗だDO。");
        } finally {
            btn.disabled = false;
            btn.classList.remove('btn-loading');
            btn.textContent = "AI作成";
            hideLoading();
        }
    }

    async function generatePrompt() {
        const btn = document.getElementById('generateBtn');
        const reviews = Array.from(document.querySelectorAll('.review-entry')).map(el => ({
            dishName: el.querySelector('.dish-name').value,
            stars: parseInt(el.querySelector('.stars').value) || 5,
            comment: el.querySelector('.comment').value
        })).filter(r => r.dishName.trim() !== "");

        if (reviews.length === 0) return alert("項目を埋めてDO！");

        btn.disabled = true;
        showLoading("プロンプト生成中だDO...");

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: document.getElementById('reviewTitle').value,
                    characterSetting: document.getElementById('charSetting').value,
                    style: document.getElementById('reviewStyle').value,
                    reviews: reviews
                })
            });
            const data = await response.json();
            document.getElementById('promptResult').textContent = data.prompt;
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
        } catch (e) {
            alert("失敗したDO...");
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }

    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('promptResult').textContent)
            .then(() => alert('写本完了だDO！'));
    }
</script>
</body>
</html>
